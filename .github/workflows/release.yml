name: Local Package Validation

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: local-package-validation-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Install devDependencies
        run: npm install
      - name: Run local validation gate
        run: npm run ci
